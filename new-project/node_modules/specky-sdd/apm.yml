name: specky-sdd
version: 3.3.2
description: "Agentic Spec-Driven Development — 10-phase pipeline with 57 MCP tools, 13 agents, 22 prompts, 8 skills, 16 hooks, EARS notation, model routing, and enterprise security"
author: Paula Silva
license: MIT
target: all

dependencies:
  mcp:
    - name: specky-sdd
      registry: false
      transport: stdio
      command: npx
      args: ["-y", "specky-sdd@latest"]
      tools: ["*"]

scripts:
  onboard: "echo 'Open Copilot Chat > @specky-onboarding'"
  status: "echo 'Open Copilot Chat > /specky-pipeline-status'"
